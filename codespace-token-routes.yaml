  - { methods: [GET], path: "/repos/{username}/{reponame}/teams/{team}", policy: repository }
  - { methods: [GET], path: "/repos/{username}/{reponame}/raw/*", policy: repository }
  - { methods: [GET], path: "/repos/{username}/{reponame}/media/*", policy: repository }
  - { methods: [GET, HEAD], path: "/repos/{username}/{reponame}/archive/*", policy: repository }
  - { methods: [GET], path: "/repos/{username}/{reponame}/forks", policy: repository }
