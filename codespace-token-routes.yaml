schema_version: 1
base_path: /api/v1
incoming_method_rules:
  head_without_explicit_handler: use_matching_get_route

# 本文件是 Codespace Token API 允许面的完整清单。path 使用 Gitea 路由注册时的
# pattern；测试从实际路由 marker 收集相同三元组并与本文件比较。Gitea 在路由
# 匹配前把没有独立 handler 的 HEAD 交给同路径 GET，因此该行为单独在上面声明；
# 显式注册 HEAD 的 archive 路由仍在 methods 中列出。
policies:
  self: 当前认证用户本身
  public_info: 不关联 repository 的公共服务信息
  repository: 直接寻址并且必须匹配 Codespace binding 的 repository
  signed_artifact: 只由 Gitea HMAC、过期时间和 artifact 状态独立授权的下载

routes:
  - { methods: [GET], path: /user, policy: self }
  - { methods: [GET], path: /version, policy: public_info }
  - { methods: [GET], path: /signing-key.gpg, policy: public_info }
  - { methods: [GET], path: /signing-key.pub, policy: public_info }

  - { methods: [GET], path: "/repos/{username}/{reponame}", policy: repository }
  - { methods: [GET], path: "/repos/{username}/{reponame}/compare/*", policy: repository }
  - { methods: [GET], path: "/repos/{username}/{reponame}/collaborators", policy: repository }
  - { methods: [GET], path: "/repos/{username}/{reponame}/collaborators/{collaborator}", policy: repository }
  - { methods: [GET], path: "/repos/{username}/{reponame}/collaborators/{collaborator}/permission", policy: repository }
